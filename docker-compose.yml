version: "3.9"

services:
  provider-api:
    image: python:3.11-slim
    container_name: provider-api
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "pip install -e . && uvicorn api.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    ports:
      - "8000:8000"

  agent-bridge:
    image: python:3.11-slim
    container_name: agent-bridge
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "pip install -e . && uvicorn api.agent_bridge:app --host 0.0.0.0 --port 3001"
    env_file:
      - .env
    ports:
      - "3001:3001"
    depends_on:
      - provider-api

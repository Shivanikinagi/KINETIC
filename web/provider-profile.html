<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KINETIC Hub | Provider Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/js/config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        body { font-family: Inter, sans-serif; background:#0b1220; color:#e2e8f0; }
        h1,h2,h3 { font-family: 'Space Grotesk', sans-serif; }
        .card { background: rgba(15, 23, 42, 0.72); border:1px solid rgba(148,163,184,0.2); border-radius: 14px; }
    </style>
</head>
<body>
    <header class="max-w-6xl mx-auto px-6 py-6 flex items-center justify-between">
        <h1 class="text-3xl text-cyan-300 font-bold">Provider Profile</h1>
        <a href="/explore.html" class="text-slate-300 hover:text-cyan-300">Back to Explore</a>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-10 grid grid-cols-1 lg:grid-cols-3 gap-5">
        <section class="card p-5 lg:col-span-2">
            <h2 id="providerName" class="text-2xl font-semibold mb-2">Loading...</h2>
            <p id="providerMeta" class="text-slate-400 text-sm"></p>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-5 text-sm">
                <div class="card p-3"><p class="text-slate-400">Reputation</p><p id="repScore" class="text-xl text-cyan-300 font-bold">-</p></div>
                <div class="card p-3"><p class="text-slate-400">Success Rate</p><p id="successRate" class="text-xl text-cyan-300 font-bold">-</p></div>
                <div class="card p-3"><p class="text-slate-400">Benchmark</p><p id="benchmark" class="text-xl text-cyan-300 font-bold">-</p></div>
                <div class="card p-3"><p class="text-slate-400">Review Avg</p><p id="reviewAvg" class="text-xl text-cyan-300 font-bold">-</p></div>
            </div>

            <h3 class="mt-6 mb-2 text-lg font-semibold">Recent Reviews</h3>
            <div id="reviews" class="space-y-2"></div>
        </section>

        <section class="card p-5">
            <h3 class="text-lg font-semibold mb-3">Leave Review</h3>
            <input id="reviewerId" placeholder="Reviewer ID" class="w-full rounded bg-slate-950 border border-slate-700 px-3 py-2 mb-2" />
            <input id="rating" type="number" min="1" max="5" value="5" class="w-full rounded bg-slate-950 border border-slate-700 px-3 py-2 mb-2" />
            <textarea id="comment" rows="5" placeholder="Comment" class="w-full rounded bg-slate-950 border border-slate-700 px-3 py-2 mb-2"></textarea>
            <button id="submitReview" class="w-full rounded bg-cyan-500 text-slate-950 font-semibold px-3 py-2">Submit Review</button>
            <p id="reviewStatus" class="text-sm text-slate-400 mt-2"></p>
        </section>
    </main>

    <script type="module" src="/static/js/provider-profile.js"></script>
</body>
</html>
